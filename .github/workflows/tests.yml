name: API Tests - Playwright

on:
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

  # Allow trigger from other repositories
  repository_dispatch:
    types: [run-api-tests]

  # Run on push to main
  push:
    branches: [main]

  # Run on PRs
  pull_request:
    branches: [main]

  # Schedule: Run every day at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'

env:
  NODE_VERSION: '20'
  API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api-project-gules.vercel.app' }}

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [staging]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run API Tests
        run: npm test -- --project=${{ matrix.project }}
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          CI: true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: reports/html/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.project }}
          path: |
            reports/results.json
            reports/junit.xml
          retention-days: 30

  # Smoke tests - quick validation
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npm run test:smoke
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          CI: true

  # Notify on completion (when triggered by repository_dispatch)
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, smoke-tests]
    if: always() && github.event_name == 'repository_dispatch'

    steps:
      - name: Report Status
        run: |
          echo "Tests completed with status: ${{ needs.test.result }}"
          echo "Smoke tests completed with status: ${{ needs.smoke-tests.result }}"

      # You can add Slack/Discord/Email notification here
      # - name: Send Slack Notification
      #   uses: slackapi/slack-github-action@v1.24.0
      #   with:
      #     payload: |
      #       {
      #         "text": "API Tests completed: ${{ needs.test.result }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
